<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校数学教材AI v20 - 教材生成</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 800px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 30px; }
        .btn-primary { background-color: #2c3e50; border: none; }
        .btn-primary:hover { background-color: #34495e; }
        #progress-container { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>高校数学教材AI v20</h1>
            <p class="text-muted">AIが完全自動で数学教材を生成します</p>
        </div>

        <div class="card p-4">
            <form id="generate-form">
                <div class="mb-3">
                    <label for="unit" class="form-label">単元を選択</label>
                    <select class="form-select" id="unit" name="unit">
                        <optgroup label="数学I">
                            <option value="数と式">数と式</option>
                            <option value="2次関数">2次関数</option>
                            <option value="図形と計量">図形と計量</option>
                            <option value="データの分析">データの分析</option>
                        </optgroup>
                        <optgroup label="数学A">
                            <option value="場合の数と確率">場合の数と確率</option>
                            <option value="図形の性質">図形の性質</option>
                            <option value="整数の性質">整数の性質</option>
                        </optgroup>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="difficulty" class="form-label">難易度</label>
                    <input type="range" class="form-range" min="1" max="5" step="1" id="difficulty" name="difficulty" value="3">
                    <div class="d-flex justify-content-between">
                        <span>基礎 (1)</span>
                        <span>標準 (3)</span>
                        <span>発展 (5)</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="num_problems" class="form-label">問題数</label>
                    <input type="number" class="form-control" id="num_problems" name="num_problems" value="5" min="1" max="20">
                </div>

                <div class="mb-3">
                    <label class="form-label">教材タイプ</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="type" id="type_worksheet" value="worksheet" checked>
                        <label class="form-check-label" for="type_worksheet">演習プリント (PDF)</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="type" id="type_exam" value="exam">
                        <label class="form-check-label" for="type_exam">小テスト (PDF)</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="type" id="type_textbook" value="textbook">
                        <label class="form-check-label" for="type_textbook">教科書 (PDF)</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="type" id="type_mock_exam" value="mock_exam">
                        <label class="form-check-label" for="type_mock_exam">模試形式 (PDF)</label>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" id="submit-btn" class="btn btn-primary btn-lg">教材を生成する</button>
                </div>
            </form>

            <div id="progress-container">
                <hr>
                <p id="status-text" class="text-center fw-bold">生成準備中...</p>
                <div class="progress" role="progressbar" aria-label="Generation progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%">0%</div>
                </div>
            </div>
        </div>

        <footer class="mt-5 text-center text-muted">
            <p>&copy; 2026 高校数学教材AI v20 Platform</p>
        </footer>
    </div>

    <script>
        document.getElementById('generate-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const submitBtn = document.getElementById('submit-btn');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            const statusText = document.getElementById('status-text');

            // UIのリセット
            submitBtn.disabled = true;
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.innerText = '0%';
            statusText.innerText = '生成を開始しています...';

            try {
                // 実際の生成リクエスト（簡略化のため、ここでは直接PDFをリクエストし、
                // サーバー側で生成完了後にダウンロードさせる。
                // 進捗のリアルタイム表示には別途SSE等の実装が必要だが、
                // まずはUI上のアニメーションで対応）
                
                let progress = 0;
                const interval = setInterval(() => {
                    if (progress < 90) {
                        progress += Math.random() * 10;
                        if (progress > 90) progress = 90;
                        progressBar.style.width = `${Math.round(progress)}%`;
                        progressBar.innerText = `${Math.round(progress)}%`;
                        
                        if (progress < 30) statusText.innerText = 'AIが問題を考案中...';
                        else if (progress < 60) statusText.innerText = '数式を検証し、図解を生成中...';
                        else statusText.innerText = 'LaTeXでPDFを構築中...';
                    }
                }, 1500);

                const response = await fetch('/generate', {
                    method: 'POST',
                    body: formData
                });

                clearInterval(interval);

                if (response.ok) {
                    progressBar.style.width = '100%';
                    progressBar.innerText = '100%';
                    statusText.innerText = '生成完了！ダウンロードを開始します。';
                    
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = response.headers.get('Content-Disposition')?.split('filename=')[1] || 'document.pdf';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    statusText.innerText = 'エラーが発生しました。';
                    statusText.classList.add('text-danger');
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = '通信エラーが発生しました。';
                statusText.classList.add('text-danger');
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
